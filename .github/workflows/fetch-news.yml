name: Fetch News Daily

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    # 添加写入权限，确保最后一步的 git commit 和 push 能够成功执行
    permissions:
      contents: write 

    steps:
      # 升级到 v4 以消除 Node.js 20 弃用警告
      - uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Fetch News
        run: node index.js
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          
      - name: Commit and push
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@github.com"
          git add news/ README.md
          git commit -m "Update news $(date +%Y%m%d)" || true
          git push
